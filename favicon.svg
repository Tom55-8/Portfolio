<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- background -->
  <rect width="16" height="16" fill="#0C0808"/>

  <!-- clapperboard body (cream/bone block) -->
  <rect x="2" y="8" width="12" height="6" fill="#D8D5CE"/>
  <!-- body shading pixels (bottom-right darker edge, PS1-style flat shading) -->
  <rect x="2" y="13" width="12" height="1" fill="#A8A49C"/>
  <rect x="13" y="8" width="1" height="6" fill="#A8A49C"/>

  <!-- top clapper bar: straight top edge -->
  <rect x="2" y="5" width="12" height="3" fill="#E8281F"/>
  <!-- bar shading -->
  <rect x="2" y="7" width="12" height="1" fill="#A31810"/>

  <!-- diagonal stripes, blocky pixel style (no smooth angles) -->
  <rect x="2" y="5" width="1" height="3" fill="#0C0808"/>
  <rect x="3" y="6" width="1" height="2" fill="#0C0808"/>

  <rect x="5" y="5" width="1" height="2" fill="#0C0808"/>
  <rect x="6" y="6" width="1" height="2" fill="#0C0808"/>

  <rect x="8" y="5" width="1" height="3" fill="#0C0808"/>
  <rect x="9" y="6" width="1" height="2" fill="#0C0808"/>

  <rect x="11" y="5" width="1" height="2" fill="#0C0808"/>
  <rect x="12" y="6" width="1" height="2" fill="#0C0808"/>

  <!-- hinge pixel -->
  <rect x="3" y="6" width="1" height="1" fill="#0C0808"/>

  <!-- outer pixel border for crisp silhouette against any tab background -->
  <rect x="2" y="4" width="12" height="1" fill="#0C0808"/>
</svg>
